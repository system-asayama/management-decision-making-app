# Auto-generated by github-support-app for Docker 化
# WEB_PORT は github-support-app が同 VPS 上の他コンテナと衝突しないよう
# 自動採番する (production=8080, dev=8081, …)。
services:
  web:
    build: .
    ports:
      - "${WEB_PORT:-8080}:8000"
    environment:
      # ?sslmode=disable と PGSSLMODE=disable の二重指定:
      # psycopg2 はどちらかが効けば SSL を要求しなくなる。
      # 公式 postgres:16-alpine は SSL を喋らないので必須。
      DATABASE_URL: postgresql://app:app@db:5432/management_decision_making_app?sslmode=disable
      PGSSLMODE: disable
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      # MCP 化したくなったら github-support-app の「🔌 MCP HTTP + OAuth PR」で
      # API_TOKEN / MCP_BEARER_TOKEN / MCP_PUBLIC_URL が後から自動追加される。
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: management_decision_making_app
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:
